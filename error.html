{% extends "base.html" %}
{% block title %}Error {{ code }} – Wanderlust{% endblock %}
{% block content %}
<div style="padding:6rem 8vw;text-align:center">
  <p style="font-size:5rem;font-family:var(--font-display);font-weight:300;color:var(--mist)">{{ code }}</p>
  <p style="font-family:var(--font-display);font-size:1.8rem;font-weight:300;margin-bottom:1rem">Something went wrong</p>
  <p style="color:var(--earth);margin-bottom:2rem">{{ message }}</p>
  <a href="/" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
